<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Debate Table</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset & base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d14;
  --surface:   #14141f;
  --surface2:  #1c1c2e;
  --border:    #2a2a40;
  --border2:   #38385a;
  --text:      #e2e8f0;
  --muted:     #7c7c9e;
  --accent:    #6366f1;
  --accent-h:  #4f52d3;

  --facilitator: #f59e0b;
  --grok:        #8b5cf6;
  --claude:      #f97316;
  --gpt:         #10b981;
  --gemini:      #3b82f6;
  --moderator:   #ec4899;
  --summary:     #06b6d4;

  --radius: 12px;
  --radius-sm: 8px;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Header ────────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.logo-icon { font-size: 22px; }

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── Phase progress bar ─────────────────────────────────────────────────── */
#phase-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: none;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
#phase-bar.visible { display: flex; }

.phase-step {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.phase-step .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}
.phase-step.active { color: var(--text); }
.phase-step.active .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.phase-step.done { color: var(--muted); }
.phase-step.done .dot { background: #22c55e; }
.phase-sep { color: var(--border2); font-size: 12px; }

/* ── Main layout ────────────────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Setup panel ────────────────────────────────────────────────────────── */
#setup-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  overflow-y: auto;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 40px;
  width: 100%;
  max-width: 640px;
}

.setup-card h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.setup-card .subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 28px;
}

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.debater-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.debater-toggle {
  position: relative;
}
.debater-toggle input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
}
.debater-toggle label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 14px;
  font-weight: 600;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text);
}
.debater-toggle input:checked + label {
  border-color: var(--speaker-color, var(--accent));
  background: color-mix(in srgb, var(--speaker-color, var(--accent)) 12%, var(--surface2));
}
.debater-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--speaker-color, var(--accent));
  flex-shrink: 0;
}

.debater-toggle[data-model="grok"]    { --speaker-color: var(--grok); }
.debater-toggle[data-model="claude"]  { --speaker-color: var(--claude); }
.debater-toggle[data-model="gpt"]     { --speaker-color: var(--gpt); }
.debater-toggle[data-model="gemini"]  { --speaker-color: var(--gemini); }

input[type="text"], textarea, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
input[type="text"]:focus,
textarea:focus,
select:focus { border-color: var(--accent); }

textarea { resize: vertical; min-height: 80px; }

.rounds-group { display: flex; gap: 8px; }
.round-btn {
  flex: 1;
  padding: 9px;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.round-btn.active {
  border-color: var(--accent);
  color: var(--text);
  background: color-mix(in srgb, var(--accent) 15%, var(--surface2));
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:not(:disabled):hover { background: var(--accent-h); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:not(:disabled):hover {
  color: var(--text);
  border-color: var(--border2);
  background: var(--surface2);
}

.btn-success {
  background: #166534;
  color: #86efac;
  border: 1px solid #15803d;
}
.btn-success:not(:disabled):hover { background: #15803d; }

.btn-lg {
  padding: 12px 28px;
  font-size: 15px;
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}

/* ── Debate panel ────────────────────────────────────────────────────────── */
#debate-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#debate-panel.visible { display: flex; }

/* Transcript */
#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
#transcript::-webkit-scrollbar { width: 6px; }
#transcript::-webkit-scrollbar-track { background: transparent; }
#transcript::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Bubbles ────────────────────────────────────────────────────────────── */
.bubble {
  max-width: 820px;
  width: 100%;
  align-self: flex-start;
}
.bubble.bubble-user-input { align-self: flex-end; }

.bubble-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.speaker-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.speaker-badge::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.8;
}

.badge-facilitator { background: color-mix(in srgb, var(--facilitator) 18%, transparent); color: var(--facilitator); }
.badge-grok        { background: color-mix(in srgb, var(--grok) 18%, transparent);        color: var(--grok); }
.badge-claude      { background: color-mix(in srgb, var(--claude) 18%, transparent);      color: var(--claude); }
.badge-gpt         { background: color-mix(in srgb, var(--gpt) 18%, transparent);         color: var(--gpt); }
.badge-gemini      { background: color-mix(in srgb, var(--gemini) 18%, transparent);      color: var(--gemini); }
.badge-moderator   { background: color-mix(in srgb, var(--moderator) 18%, transparent);   color: var(--moderator); }
.badge-summary     { background: color-mix(in srgb, var(--summary) 18%, transparent);     color: var(--summary); }

.round-tag {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

.typing-indicator {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
}
.typing-indicator span {
  width: 5px; height: 5px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

.bubble-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px var(--radius) var(--radius) var(--radius);
  padding: 16px 20px;
  line-height: 1.7;
  font-size: 14px;
}
.bubble.bubble-user-input .bubble-body {
  background: color-mix(in srgb, var(--moderator) 10%, var(--surface));
  border-color: color-mix(in srgb, var(--moderator) 30%, var(--border));
  border-radius: var(--radius) 4px var(--radius) var(--radius);
}
.bubble.bubble-summary .bubble-body {
  background: color-mix(in srgb, var(--summary) 6%, var(--surface));
  border-color: color-mix(in srgb, var(--summary) 25%, var(--border));
  border-left: 3px solid var(--summary);
}

/* Markdown inside bubbles */
.bubble-body h1, .bubble-body h2, .bubble-body h3 {
  margin: 14px 0 6px;
  color: var(--text);
  line-height: 1.3;
}
.bubble-body h2 { font-size: 15px; }
.bubble-body h3 { font-size: 14px; color: var(--muted); }
.bubble-body p { margin-bottom: 10px; }
.bubble-body p:last-child { margin-bottom: 0; }
.bubble-body ul, .bubble-body ol { padding-left: 22px; margin-bottom: 10px; }
.bubble-body li { margin-bottom: 4px; }
.bubble-body strong { color: var(--text); font-weight: 600; }
.bubble-body em { color: var(--muted); }
.bubble-body code {
  background: var(--surface2);
  padding: 2px 5px;
  border-radius: 4px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
}
.bubble-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Streaming cursor */
.streaming-cursor::after {
  content: '▌';
  color: var(--accent);
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Phase divider */
.phase-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 4px 0;
}
.phase-divider::before, .phase-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Controls bar ────────────────────────────────────────────────────────── */
#controls-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.controls-topic {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.controls-topic strong { color: var(--text); }

/* ── Interrupt bar ───────────────────────────────────────────────────────── */
#interrupt-bar {
  background: var(--surface2);
  border-top: 1px solid var(--border);
  padding: 10px 24px 12px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

#interrupt-bar .interrupt-label {
  font-size: 11px;
  color: var(--moderator);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.interrupt-input-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#interrupt-input {
  min-height: 38px;
  max-height: 120px;
  resize: none;
  font-size: 13px;
  padding: 8px 12px;
  border-color: color-mix(in srgb, var(--moderator) 30%, var(--border));
  transition: border-color 0.15s;
}
#interrupt-input:focus {
  border-color: var(--moderator);
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.error { border-color: #ef4444; color: #fca5a5; }
#toast.success { border-color: #22c55e; color: #86efac; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <span class="logo-icon">🎙️</span>
    <span>AI Debate Forum</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-new-debate" style="display:none" onclick="resetToSetup()">
      ↩ New Debate
    </button>
  </div>
</header>

<!-- ── Phase progress ─────────────────────────────────────────────────────── -->
<div id="phase-bar"></div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main>

  <!-- Setup panel -->
  <div id="setup-panel">
    <div class="setup-card">
      <h2>New Debate</h2>
      <p class="subtitle">Select at least 2 AI participants, enter your topic, and start.</p>

      <!-- Debater selection -->
      <div class="form-group">
        <label>Participants</label>
        <div class="debater-grid">
          <div class="debater-toggle" data-model="grok">
            <input type="checkbox" id="chk-grok" value="grok" />
            <label for="chk-grok">
              <span class="debater-dot"></span> Grok
            </label>
          </div>
          <div class="debater-toggle" data-model="claude">
            <input type="checkbox" id="chk-claude" value="claude" checked />
            <label for="chk-claude">
              <span class="debater-dot"></span> Claude
            </label>
          </div>
          <div class="debater-toggle" data-model="gpt">
            <input type="checkbox" id="chk-gpt" value="gpt" checked />
            <label for="chk-gpt">
              <span class="debater-dot"></span> GPT
            </label>
          </div>
          <div class="debater-toggle" data-model="gemini">
            <input type="checkbox" id="chk-gemini" value="gemini" />
            <label for="chk-gemini">
              <span class="debater-dot"></span> Gemini
            </label>
          </div>
        </div>
      </div>

      <!-- Topic -->
      <div class="form-group">
        <label>Debate Topic</label>
        <input type="text" id="topic-input" placeholder="e.g. Should AI systems be open-sourced?" />
      </div>

      <!-- Context -->
      <div class="form-group">
        <label>Additional Context <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <textarea id="context-input" placeholder="Provide background, constraints, or framing the facilitator should use…"></textarea>
      </div>

      <!-- Rounds -->
      <div class="form-group">
        <label>Debate Rounds</label>
        <div class="rounds-group">
          <button class="round-btn" data-rounds="1" onclick="setRounds(1)">1 Round</button>
          <button class="round-btn active" data-rounds="2" onclick="setRounds(2)">2 Rounds</button>
          <button class="round-btn" data-rounds="3" onclick="setRounds(3)">3 Rounds</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg" onclick="startDebate()">
        ▶ Start Debate
      </button>
    </div>
  </div>

  <!-- Debate panel -->
  <div id="debate-panel">
    <div id="transcript"></div>

    <!-- Controls -->
    <div id="controls-bar">
      <div class="controls-topic" id="controls-topic"></div>
      <button class="btn btn-primary" id="btn-start-round" onclick="startRound()" disabled>
        ▶ Start Round 1
      </button>
      <button class="btn btn-success" id="btn-summarize" onclick="startSummary()" disabled>
        📋 Summary
      </button>
    </div>

    <!-- Interrupt -->
    <div id="interrupt-bar">
      <div class="interrupt-input-wrap">
        <div class="interrupt-label">📣 Your input (interrupt anytime)</div>
        <textarea id="interrupt-input" rows="1"
          placeholder="Add context, challenge an argument, or redirect the debate…"
          oninput="autoResize(this)"
          onkeydown="interruptKeydown(event)"></textarea>
      </div>
      <button class="btn btn-ghost" id="btn-interrupt" onclick="sendInterrupt()" style="margin-bottom:2px">
        Send
      </button>
    </div>
  </div>

</main>

<div id="toast"></div>

<!-- ── Application logic ──────────────────────────────────────────────────── -->
<script>
marked.setOptions({ breaks: true, gfm: true });

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  sessionId: null,
  eventSource: null,
  phase: 'setup',         // setup | facilitation | ready | round_N | summary | done
  currentRound: 0,
  maxRounds: 2,
  selectedRounds: 2,
  debaters: [],
  activeSpeaker: null,    // speaker key currently streaming
  activeBubble: null,     // DOM element being streamed into
  activeText: '',         // raw text buffer for the active bubble
  isBusy: false,
};

// ── Setup helpers ──────────────────────────────────────────────────────────
function setRounds(n) {
  state.selectedRounds = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.rounds) === n);
  });
}

function getSelectedDebaters() {
  return [...document.querySelectorAll('.debater-grid input:checked')]
    .map(el => el.value);
}

// ── Start debate ───────────────────────────────────────────────────────────
async function startDebate() {
  const debaters = getSelectedDebaters();
  const topic = document.getElementById('topic-input').value.trim();
  const context = document.getElementById('context-input').value.trim();

  if (debaters.length < 2) { toast('Select at least 2 debaters', 'error'); return; }
  if (!topic) { toast('Enter a debate topic', 'error'); return; }

  state.debaters = debaters;
  state.maxRounds = state.selectedRounds;

  let data;
  try {
    const res = await fetch('/api/session/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ debaters, topic, context, rounds: state.selectedRounds }),
    });
    data = await res.json();
    if (!res.ok) { toast(data.error || 'Failed to create session', 'error'); return; }
  } catch (e) {
    toast('Cannot reach the server. Is app.py running?', 'error');
    return;
  }

  state.sessionId = data.session_id;
  state.currentRound = 0;
  state.phase = 'facilitation';

  showDebatePanel(topic);
  connectSSE();

  // Kick off facilitation
  await apiPost('/facilitate');
}

// ── UI switch ──────────────────────────────────────────────────────────────
function showDebatePanel(topic) {
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('debate-panel').classList.add('visible');
  document.getElementById('btn-new-debate').style.display = 'inline-flex';
  document.getElementById('controls-topic').innerHTML =
    `<strong>Topic:</strong> ${escapeHtml(topic)}`;
  buildPhaseBar();
}

function resetToSetup() {
  if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
  state.sessionId = null;
  state.phase = 'setup';
  state.currentRound = 0;
  state.activeSpeaker = null;
  state.activeBubble = null;
  state.isBusy = false;

  document.getElementById('transcript').innerHTML = '';
  document.getElementById('setup-panel').style.display = '';
  document.getElementById('debate-panel').classList.remove('visible');
  document.getElementById('btn-new-debate').style.display = 'none';
  document.getElementById('phase-bar').classList.remove('visible');
  document.getElementById('phase-bar').innerHTML = '';
  document.getElementById('interrupt-input').value = '';
  updateControls();
}

// ── Phase bar ──────────────────────────────────────────────────────────────
function buildPhaseBar() {
  const bar = document.getElementById('phase-bar');
  bar.innerHTML = '';

  const phases = [
    { key: 'facilitation', label: 'Intro' },
    ...Array.from({ length: state.maxRounds }, (_, i) => ({
      key: `round_${i + 1}`,
      label: `Round ${i + 1}`,
    })),
    { key: 'summary', label: 'Summary' },
  ];

  phases.forEach((p, idx) => {
    if (idx > 0) {
      const sep = document.createElement('span');
      sep.className = 'phase-sep';
      sep.textContent = '›';
      bar.appendChild(sep);
    }
    const step = document.createElement('div');
    step.className = 'phase-step';
    step.id = `phase-step-${p.key}`;
    step.innerHTML = `<span class="dot"></span>${p.label}`;
    bar.appendChild(step);
  });

  bar.classList.add('visible');
  setActivePhase('facilitation');
}

function setActivePhase(phaseKey) {
  document.querySelectorAll('.phase-step').forEach(el => {
    el.classList.remove('active', 'done');
  });

  const phases = [...document.querySelectorAll('.phase-step')];
  let reached = false;
  phases.forEach(el => {
    const key = el.id.replace('phase-step-', '');
    if (key === phaseKey) { el.classList.add('active'); reached = true; }
    else if (!reached) { el.classList.add('done'); }
  });
}

// ── SSE ────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (state.eventSource) state.eventSource.close();
  state.eventSource = new EventSource(`/api/stream/${state.sessionId}`);
  state.eventSource.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); }
    catch (_) {}
  };
  state.eventSource.onerror = () => {
    // Auto-reconnect is handled by the browser; we just don't log it
  };
}

// ── Event dispatch ─────────────────────────────────────────────────────────
function handleEvent(ev) {
  switch (ev.type) {
    case 'heartbeat': break;

    case 'phase_change':
      state.phase = ev.phase;
      if (ev.round !== undefined) {
        state.currentRound = ev.round;
        state.maxRounds = ev.max_rounds ?? state.maxRounds;
      }
      setActivePhase(ev.phase);
      if (ev.phase.startsWith('round_')) {
        appendPhaseDivider(`Round ${ev.round} of ${state.maxRounds}`);
      } else if (ev.phase === 'summary') {
        appendPhaseDivider('Final Summary');
        setActivePhase('summary');
      }
      break;

    case 'speaker_start':
      state.isBusy = true;
      state.activeSpeaker = ev.speaker;
      state.activeText = '';
      state.activeBubble = createBubble(ev.speaker, ev.round);
      updateControls();
      break;

    case 'text_chunk':
      if (state.activeBubble && state.activeSpeaker === ev.speaker) {
        state.activeText += ev.text;
        const body = state.activeBubble.querySelector('.bubble-body');
        body.textContent = state.activeText;  // raw while streaming
        body.classList.add('streaming-cursor');
        scrollToBottom();
      }
      break;

    case 'speaker_done':
      if (state.activeBubble) {
        const body = state.activeBubble.querySelector('.bubble-body');
        body.classList.remove('streaming-cursor');
        body.innerHTML = marked.parse(state.activeText);  // render markdown
        const indicator = state.activeBubble.querySelector('.typing-indicator');
        if (indicator) indicator.remove();
      }
      state.activeBubble = null;
      state.activeSpeaker = null;
      state.activeText = '';
      // phase 'ready' is set by the manager after all speakers in a round finish
      // We check if we just finished the last round speaker
      if (ev.speaker !== 'facilitator' && ev.speaker !== 'summary') {
        // keep isBusy true until the round/phase ends
      } else {
        state.isBusy = false;
        updateControls();
      }
      break;

    case 'user_input':
      appendUserBubble(ev.text);
      break;

    case 'debate_ended':
      state.phase = 'done';
      state.isBusy = false;
      if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
      setActivePhase('summary');
      updateControls();
      toast('Debate concluded — summary ready!', 'success');
      break;
  }
}

// ── Bubble helpers ─────────────────────────────────────────────────────────
const SPEAKER_META = {
  facilitator: { label: 'Facilitator', badge: 'badge-facilitator' },
  grok:        { label: 'Grok',        badge: 'badge-grok' },
  claude:      { label: 'Claude',      badge: 'badge-claude' },
  gpt:         { label: 'GPT',         badge: 'badge-gpt' },
  gemini:      { label: 'Gemini',      badge: 'badge-gemini' },
  summary:     { label: 'Summary',     badge: 'badge-summary' },
  moderator:   { label: 'You',         badge: 'badge-moderator' },
};

function createBubble(speaker, round) {
  const meta = SPEAKER_META[speaker] || { label: speaker, badge: '' };
  const transcript = document.getElementById('transcript');

  const bubble = document.createElement('div');
  bubble.className = `bubble bubble-${speaker}`;

  const header = document.createElement('div');
  header.className = 'bubble-header';

  const badge = document.createElement('span');
  badge.className = `speaker-badge ${meta.badge}`;
  badge.textContent = meta.label;
  header.appendChild(badge);

  if (round) {
    const tag = document.createElement('span');
    tag.className = 'round-tag';
    tag.textContent = `Round ${round}`;
    header.appendChild(tag);
  }

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  header.appendChild(typing);

  const body = document.createElement('div');
  body.className = 'bubble-body';

  bubble.appendChild(header);
  bubble.appendChild(body);
  transcript.appendChild(bubble);
  scrollToBottom();
  return bubble;
}

function appendUserBubble(text) {
  const transcript = document.getElementById('transcript');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-user-input';

  const header = document.createElement('div');
  header.className = 'bubble-header';
  header.style.justifyContent = 'flex-end';
  const badge = document.createElement('span');
  badge.className = 'speaker-badge badge-moderator';
  badge.textContent = 'You';
  header.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'bubble-body';
  body.innerHTML = marked.parse(escapeHtml(text));

  bubble.appendChild(header);
  bubble.appendChild(body);
  transcript.appendChild(bubble);
  scrollToBottom();
}

function appendPhaseDivider(label) {
  const div = document.createElement('div');
  div.className = 'phase-divider';
  div.textContent = label;
  document.getElementById('transcript').appendChild(div);
}

function scrollToBottom() {
  const t = document.getElementById('transcript');
  t.scrollTop = t.scrollHeight;
}

// ── Control buttons ────────────────────────────────────────────────────────
function updateControls() {
  const phase = state.phase;
  const busy = state.isBusy;
  const roundBtn = document.getElementById('btn-start-round');
  const sumBtn = document.getElementById('btn-summarize');

  const canStartRound = !busy && phase === 'ready' && state.currentRound < state.maxRounds;
  const canSummarize = !busy && (phase === 'ready' || phase === 'done') && state.currentRound > 0 && phase !== 'done' && phase !== 'summary';

  roundBtn.disabled = !canStartRound;
  roundBtn.textContent = `▶ Start Round ${state.currentRound + 1}`;
  sumBtn.disabled = !canSummarize;
}

// ── Actions ────────────────────────────────────────────────────────────────
async function startRound() {
  if (state.isBusy) return;
  state.isBusy = true;
  updateControls();
  await apiPost('/round');
}

async function startSummary() {
  if (state.isBusy) return;
  state.isBusy = true;
  updateControls();
  await apiPost('/summarize');
}

async function sendInterrupt() {
  const input = document.getElementById('interrupt-input');
  const message = input.value.trim();
  if (!message || !state.sessionId) return;

  input.value = '';
  autoResize(input);

  const res = await fetch(`/api/session/${state.sessionId}/interrupt`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  if (!res.ok) {
    const d = await res.json();
    toast(d.error || 'Failed to send', 'error');
  } else {
    toast('Your input added — debaters will address it in the next round', 'success');
  }
}

function interruptKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInterrupt();
  }
}

async function apiPost(path) {
  if (!state.sessionId) return;
  try {
    const res = await fetch(`/api/session/${state.sessionId}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    if (!res.ok) {
      const d = await res.json();
      toast(d.error || 'Request failed', 'error');
      state.isBusy = false;
      updateControls();
    }
  } catch {
    toast('Server unreachable', 'error');
    state.isBusy = false;
    updateControls();
  }
}

// Handle round completion: manager pushes speaker_done for each debater,
// then phase returns to 'ready' — we detect it via the last speaker in the round.
// Since the server has no explicit "round_done" event, we track it by watching
// phase_change back to ready (which isn't sent currently).
// Instead we patch: after any speaker_done that is NOT facilitator/summary,
// re-fetch status to sync state.
const _origHandle = handleEvent;
// We extend the speaker_done case to poll status once all chunks arrive
document.addEventListener('DOMContentLoaded', () => {});

// Poll status after each non-facilitator speaker finishes to sync isBusy
const origHandleEvent = handleEvent;
window._sseHandler = function(ev) {
  if (ev.type === 'speaker_done' && !['facilitator','summary'].includes(ev.speaker)) {
    syncStatus();
  }
};

function connectSSE() {
  if (state.eventSource) state.eventSource.close();
  state.eventSource = new EventSource(`/api/stream/${state.sessionId}`);
  state.eventSource.onmessage = e => {
    try {
      const ev = JSON.parse(e.data);
      handleEvent(ev);
      window._sseHandler(ev);
    } catch (_) {}
  };
}

async function syncStatus() {
  if (!state.sessionId) return;
  try {
    const res = await fetch(`/api/session/${state.sessionId}/status`);
    if (!res.ok) return;
    const data = await res.json();
    const wasReady = (data.phase === 'ready');
    if (wasReady) {
      state.phase = 'ready';
      state.isBusy = false;
      state.currentRound = data.current_round;
      state.maxRounds = data.max_rounds;
      updateControls();
    }
  } catch (_) {}
}

// ── Utility ────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ` ${type}` : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
