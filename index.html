<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Debate Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset & base ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Shopee brand colours */
  --bg:        #FFF5F3;
  --surface:   #FFFFFF;
  --surface2:  #FFF0ED;
  --border:    #F0D8D3;
  --border2:   #E2C4BC;
  --text:      #172B4D;
  --muted:     #8A9BB5;
  --accent:    #EE4D2D;
  --accent-h:  #D0391A;

  /* Speaker palette — all within Shopee extended range */
  --facilitator: #FCCD34;
  --grok:        #7B61FF;
  --claude:      #F05025;
  --gpt:         #0080C6;
  --gemini:      #00A651;
  --moderator:   #172B4D;
  --summary:     #0080C6;

  --radius:    12px;
  --radius-sm: 8px;

  --shadow-sm: 0 1px 4px rgba(23,43,77,.06);
  --shadow:    0 4px 16px rgba(23,43,77,.10);
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Header ────────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
  /* Shopee orange gradient strip at the very top */
  border-top: 3px solid transparent;
  background-clip: padding-box;
  position: sticky;
}
header::before {
  content: '';
  position: absolute;
  top: -3px; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #EE4D2D 0%, #F05025 60%, #FCCD34 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--accent);
}
.logo-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.logo-text { color: var(--text); }
.logo-text span { color: var(--accent); }

.header-actions { display: flex; gap: 8px; align-items: center; }

/* ── Phase progress bar ─────────────────────────────────────────────────── */
#phase-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: none;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
#phase-bar.visible { display: flex; }

.phase-step {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}
.phase-step .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}
.phase-step.active { color: var(--accent); font-weight: 700; }
.phase-step.active .dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(238,77,45,.20);
}
.phase-step.done { color: var(--muted); }
.phase-step.done .dot { background: #00A651; }
.phase-sep { color: var(--border2); font-size: 14px; }

/* ── Main layout ────────────────────────────────────────────────────────── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Setup panel ────────────────────────────────────────────────────────── */
#setup-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  overflow-y: auto;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 640px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* Hero band at top of setup card */
.setup-hero {
  background: linear-gradient(135deg, #EE4D2D 0%, #F05025 70%, #FF6B45 100%);
  padding: 28px 36px 24px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.setup-hero::after {
  content: '🗣';
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 64px;
  opacity: 0.18;
  line-height: 1;
}
.setup-hero h2 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
}
.setup-hero p {
  font-size: 13px;
  opacity: 0.88;
  max-width: 380px;
  line-height: 1.5;
}

.setup-form {
  padding: 28px 36px 32px;
}

.form-group { margin-bottom: 22px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}

.debater-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.debater-toggle {
  position: relative;
}
.debater-toggle input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0; height: 0;
}
.debater-toggle label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  font-size: 14px;
  font-weight: 600;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text);
}
.debater-toggle label:hover {
  border-color: var(--border2);
  box-shadow: var(--shadow-sm);
}
.debater-toggle input:checked + label {
  border-color: var(--speaker-color, var(--accent));
  background: color-mix(in srgb, var(--speaker-color, var(--accent)) 8%, #fff);
  box-shadow: 0 0 0 1px var(--speaker-color, var(--accent));
}
.debater-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--speaker-color, var(--accent));
  flex-shrink: 0;
}

.debater-toggle[data-model="grok"]   { --speaker-color: var(--grok); }
.debater-toggle[data-model="claude"] { --speaker-color: var(--claude); }
.debater-toggle[data-model="gpt"]    { --speaker-color: var(--gpt); }
.debater-toggle[data-model="gemini"] { --speaker-color: var(--gemini); }

input[type="text"], textarea, select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
input[type="text"]::placeholder,
textarea::placeholder { color: var(--muted); }
input[type="text"]:focus,
textarea:focus,
select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(238,77,45,.12);
  background: #fff;
}

textarea { resize: vertical; min-height: 80px; }

.rounds-group { display: flex; gap: 8px; }
.round-btn {
  flex: 1;
  padding: 9px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.round-btn:hover { border-color: var(--border2); color: var(--text); }
.round-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(238,77,45,.08);
}

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
  font-family: inherit;
  letter-spacing: 0.2px;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(238,77,45,.30);
}
.btn-primary:not(:disabled):hover {
  background: var(--accent-h);
  box-shadow: 0 4px 12px rgba(238,77,45,.40);
  transform: translateY(-1px);
}
.btn-primary:not(:disabled):active { transform: translateY(0); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
}
.btn-ghost:not(:disabled):hover {
  color: var(--text);
  border-color: var(--border2);
  background: var(--bg);
}

.btn-success {
  background: #E9F9EF;
  color: #00A651;
  border: 1.5px solid #B2E8C8;
  box-shadow: none;
}
.btn-success:not(:disabled):hover {
  background: #D0F2E0;
  border-color: #00A651;
}

.btn-lg {
  padding: 13px 28px;
  font-size: 15px;
  width: 100%;
  justify-content: center;
  margin-top: 6px;
  border-radius: var(--radius-sm);
  letter-spacing: 0.3px;
}

/* ── Debate panel ────────────────────────────────────────────────────────── */
#debate-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#debate-panel.visible { display: flex; }

/* Transcript */
#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
  background: var(--bg);
}
#transcript::-webkit-scrollbar { width: 6px; }
#transcript::-webkit-scrollbar-track { background: transparent; }
#transcript::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Bubbles ────────────────────────────────────────────────────────────── */
.bubble {
  max-width: 840px;
  width: 100%;
  align-self: flex-start;
}
.bubble.bubble-user-input { align-self: flex-end; }

.bubble-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.speaker-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.speaker-badge::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.8;
}

.badge-facilitator { background: rgba(252,205,52,.18); color: #B8870A; }
.badge-grok        { background: rgba(123,97,255,.14);  color: #5B41E0; }
.badge-claude      { background: rgba(240,80,37,.14);   color: #C63412; }
.badge-gpt         { background: rgba(0,128,198,.14);   color: #0068A8; }
.badge-gemini      { background: rgba(0,166,81,.14);    color: #007A3C; }
.badge-moderator   { background: rgba(23,43,77,.12);    color: #172B4D; }
.badge-summary     { background: rgba(0,128,198,.14);   color: #0068A8; }

.round-tag {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

.typing-indicator {
  display: flex;
  align-items: center;
  gap: 3px;
  margin-left: auto;
}
.typing-indicator span {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
  opacity: 0.5;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
  40% { transform: translateY(-5px); opacity: 1; }
}

.bubble-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px var(--radius) var(--radius) var(--radius);
  padding: 16px 20px;
  line-height: 1.75;
  font-size: 14px;
  box-shadow: var(--shadow-sm);
  color: var(--text);
}
.bubble.bubble-user-input .bubble-body {
  background: var(--text);
  color: #fff;
  border-color: transparent;
  border-radius: var(--radius) 4px var(--radius) var(--radius);
  box-shadow: 0 2px 8px rgba(23,43,77,.20);
}
.bubble.bubble-summary .bubble-body {
  background: rgba(0,128,198,.05);
  border-color: rgba(0,128,198,.25);
  border-left: 3px solid var(--summary);
}

/* Markdown inside bubbles */
.bubble-body h1, .bubble-body h2, .bubble-body h3 {
  margin: 14px 0 6px;
  color: var(--text);
  line-height: 1.3;
}
.bubble-body h2 { font-size: 15px; font-weight: 700; }
.bubble-body h3 { font-size: 14px; color: var(--muted); }
.bubble-body p  { margin-bottom: 10px; }
.bubble-body p:last-child { margin-bottom: 0; }
.bubble-body ul, .bubble-body ol { padding-left: 22px; margin-bottom: 10px; }
.bubble-body li { margin-bottom: 4px; }
.bubble-body strong { color: var(--text); font-weight: 700; }
.bubble-body em { color: var(--muted); }
.bubble-body code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  font-family: "SF Mono", "Fira Code", monospace;
  border: 1px solid var(--border);
}
.bubble-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* User bubble — invert text colours for dark background */
.bubble.bubble-user-input .bubble-body strong,
.bubble.bubble-user-input .bubble-body em,
.bubble.bubble-user-input .bubble-body h2,
.bubble.bubble-user-input .bubble-body h3 { color: #fff; opacity: 0.9; }
.bubble.bubble-user-input .bubble-body code {
  background: rgba(255,255,255,.15);
  border-color: rgba(255,255,255,.2);
  color: #fff;
}

/* Streaming cursor */
.streaming-cursor::after {
  content: '▌';
  color: var(--accent);
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Phase divider */
.phase-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 0;
}
.phase-divider::before, .phase-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Controls bar ────────────────────────────────────────────────────────── */
#controls-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
  box-shadow: 0 -2px 8px rgba(23,43,77,.05);
}

.controls-topic {
  font-size: 12px;
  color: var(--muted);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.controls-topic strong { color: var(--text); font-weight: 600; }

/* ── Interrupt bar ───────────────────────────────────────────────────────── */
#interrupt-bar {
  background: var(--surface2);
  border-top: 1px solid var(--border);
  padding: 10px 24px 12px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

#interrupt-bar .interrupt-label {
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 4px;
}

.interrupt-input-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

#interrupt-input {
  min-height: 38px;
  max-height: 120px;
  resize: none;
  font-size: 13px;
  padding: 8px 12px;
  border-color: var(--border);
}
#interrupt-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(238,77,45,.12);
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
  box-shadow: var(--shadow);
  color: var(--text);
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.error  { border-color: #EE4D2D; color: #C63412; background: #FFF5F3; }
#toast.success { border-color: #00A651; color: #007A3C; background: #F0FBF5; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">🗣</div>
    <span class="logo-text">AI <span>Debate</span> Table</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-new-debate" style="display:none" onclick="resetToSetup()">
      ↩ New Debate
    </button>
  </div>
</header>

<!-- ── Phase progress ─────────────────────────────────────────────────────── -->
<div id="phase-bar"></div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main>

  <!-- Setup panel -->
  <div id="setup-panel">
    <div class="setup-card">
      <!-- Hero band -->
      <div class="setup-hero">
        <h2>Start a Debate</h2>
        <p>Bring the world's top AIs to your table. Pick your lineup, drop a topic, and let the ideas fly!</p>
      </div>

      <!-- Form -->
      <div class="setup-form">

        <!-- Debater selection -->
        <div class="form-group">
          <label>Participants</label>
          <div class="debater-grid">
            <div class="debater-toggle" data-model="grok">
              <input type="checkbox" id="chk-grok" value="grok" />
              <label for="chk-grok">
                <span class="debater-dot"></span> Grok
              </label>
            </div>
            <div class="debater-toggle" data-model="claude">
              <input type="checkbox" id="chk-claude" value="claude" checked />
              <label for="chk-claude">
                <span class="debater-dot"></span> Claude
              </label>
            </div>
            <div class="debater-toggle" data-model="gpt">
              <input type="checkbox" id="chk-gpt" value="gpt" checked />
              <label for="chk-gpt">
                <span class="debater-dot"></span> GPT
              </label>
            </div>
            <div class="debater-toggle" data-model="gemini">
              <input type="checkbox" id="chk-gemini" value="gemini" />
              <label for="chk-gemini">
                <span class="debater-dot"></span> Gemini
              </label>
            </div>
          </div>
        </div>

        <!-- Topic -->
        <div class="form-group">
          <label>Debate Topic</label>
          <input type="text" id="topic-input" placeholder="e.g. Should AI systems be open-sourced?" />
        </div>

        <!-- Context -->
        <div class="form-group">
          <label style="display:flex;align-items:center;justify-content:space-between;">
            <span>Additional Context <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></span>
            <button type="button" class="btn btn-ghost" id="btn-gen-context"
              onclick="generateContext()"
              style="font-size:11px;padding:4px 10px;height:auto;text-transform:none;letter-spacing:0;border-radius:6px;">
              ✨ Generate with AI
            </button>
          </label>
          <textarea id="context-input" placeholder="Provide background, constraints, or framing the facilitator should use…"></textarea>
          <div id="context-gen-status" style="display:none;font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px;">
            <span id="context-gen-msg"></span>
          </div>
        </div>

        <!-- Rounds -->
        <div class="form-group">
          <label>Debate Rounds</label>
          <div class="rounds-group">
            <button class="round-btn" data-rounds="1" onclick="setRounds(1)">1 Round</button>
            <button class="round-btn active" data-rounds="2" onclick="setRounds(2)">2 Rounds</button>
            <button class="round-btn" data-rounds="3" onclick="setRounds(3)">3 Rounds</button>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" onclick="startDebate()">
          ▶&nbsp; Start the Debate
        </button>
      </div>
    </div>
  </div>

  <!-- Debate panel -->
  <div id="debate-panel">
    <div id="transcript"></div>

    <!-- Controls -->
    <div id="controls-bar">
      <div class="controls-topic" id="controls-topic"></div>
      <button class="btn btn-primary" id="btn-start-round" onclick="startRound()" disabled>
        ▶ Start Round 1
      </button>
      <button class="btn btn-success" id="btn-summarize" onclick="startSummary()" disabled>
        📋 Summary
      </button>
    </div>

    <!-- Interrupt -->
    <div id="interrupt-bar">
      <div class="interrupt-input-wrap">
        <div class="interrupt-label">📣 Your input — jump in anytime</div>
        <textarea id="interrupt-input" rows="1"
          placeholder="Add context, challenge an argument, or redirect the debate…"
          oninput="autoResize(this)"
          onkeydown="interruptKeydown(event)"></textarea>
      </div>
      <button class="btn btn-primary" id="btn-interrupt" onclick="sendInterrupt()" style="margin-bottom:2px">
        Send
      </button>
    </div>
  </div>

</main>

<div id="toast"></div>

<!-- ── Application logic ──────────────────────────────────────────────────── -->
<script>
marked.setOptions({ breaks: true, gfm: true });

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  sessionId: null,
  eventSource: null,
  phase: 'setup',         // setup | facilitation | ready | round_N | summary | done
  currentRound: 0,
  maxRounds: 2,
  selectedRounds: 2,
  debaters: [],
  activeSpeaker: null,    // speaker key currently streaming
  activeBubble: null,     // DOM element being streamed into
  activeText: '',         // raw text buffer for the active bubble
  isBusy: false,
};

// ── Setup helpers ──────────────────────────────────────────────────────────
function setRounds(n) {
  state.selectedRounds = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.rounds) === n);
  });
}

function getSelectedDebaters() {
  return [...document.querySelectorAll('.debater-grid input:checked')]
    .map(el => el.value);
}

// ── Start debate ───────────────────────────────────────────────────────────
async function startDebate() {
  const debaters = getSelectedDebaters();
  const topic = document.getElementById('topic-input').value.trim();
  const context = document.getElementById('context-input').value.trim();

  if (debaters.length < 2) { toast('Select at least 2 debaters', 'error'); return; }
  if (!topic) { toast('Enter a debate topic', 'error'); return; }

  state.debaters = debaters;
  state.maxRounds = state.selectedRounds;

  let data;
  try {
    const res = await fetch('/api/session/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ debaters, topic, context, rounds: state.selectedRounds }),
    });
    data = await res.json();
    if (!res.ok) { toast(data.error || 'Failed to create session', 'error'); return; }
  } catch (e) {
    toast('Cannot reach the server. Is app.py running?', 'error');
    return;
  }

  state.sessionId = data.session_id;
  state.currentRound = 0;
  state.phase = 'facilitation';

  showDebatePanel(topic);
  connectSSE();

  // Kick off facilitation
  await apiPost('/facilitate');
}

// ── UI switch ──────────────────────────────────────────────────────────────
function showDebatePanel(topic) {
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('debate-panel').classList.add('visible');
  document.getElementById('btn-new-debate').style.display = 'inline-flex';
  document.getElementById('controls-topic').innerHTML =
    `<strong>Topic:</strong> ${escapeHtml(topic)}`;
  buildPhaseBar();
}

function resetToSetup() {
  if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
  state.sessionId = null;
  state.phase = 'setup';
  state.currentRound = 0;
  state.activeSpeaker = null;
  state.activeBubble = null;
  state.isBusy = false;

  document.getElementById('transcript').innerHTML = '';
  document.getElementById('setup-panel').style.display = '';
  document.getElementById('debate-panel').classList.remove('visible');
  document.getElementById('btn-new-debate').style.display = 'none';
  document.getElementById('phase-bar').classList.remove('visible');
  document.getElementById('phase-bar').innerHTML = '';
  document.getElementById('interrupt-input').value = '';
  updateControls();
}

// ── Phase bar ──────────────────────────────────────────────────────────────
function buildPhaseBar() {
  const bar = document.getElementById('phase-bar');
  bar.innerHTML = '';

  const phases = [
    { key: 'facilitation', label: 'Intro' },
    ...Array.from({ length: state.maxRounds }, (_, i) => ({
      key: `round_${i + 1}`,
      label: `Round ${i + 1}`,
    })),
    { key: 'summary', label: 'Summary' },
  ];

  phases.forEach((p, idx) => {
    if (idx > 0) {
      const sep = document.createElement('span');
      sep.className = 'phase-sep';
      sep.textContent = '›';
      bar.appendChild(sep);
    }
    const step = document.createElement('div');
    step.className = 'phase-step';
    step.id = `phase-step-${p.key}`;
    step.innerHTML = `<span class="dot"></span>${p.label}`;
    bar.appendChild(step);
  });

  bar.classList.add('visible');
  setActivePhase('facilitation');
}

function setActivePhase(phaseKey) {
  document.querySelectorAll('.phase-step').forEach(el => {
    el.classList.remove('active', 'done');
  });

  const phases = [...document.querySelectorAll('.phase-step')];
  let reached = false;
  phases.forEach(el => {
    const key = el.id.replace('phase-step-', '');
    if (key === phaseKey) { el.classList.add('active'); reached = true; }
    else if (!reached) { el.classList.add('done'); }
  });
}

// ── SSE ────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (state.eventSource) state.eventSource.close();
  state.eventSource = new EventSource(`/api/stream/${state.sessionId}`);
  state.eventSource.onmessage = e => {
    try {
      const ev = JSON.parse(e.data);
      handleEvent(ev);
      if (ev.type === 'speaker_done' && !['facilitator', 'summary'].includes(ev.speaker)) {
        syncStatus();
      }
    } catch (_) {}
  };
  state.eventSource.onerror = () => {
    // Browser auto-reconnects; no action needed
  };
}

// ── Event dispatch ─────────────────────────────────────────────────────────
function handleEvent(ev) {
  switch (ev.type) {
    case 'heartbeat': break;

    case 'phase_change':
      state.phase = ev.phase;
      if (ev.round !== undefined) {
        state.currentRound = ev.round;
        state.maxRounds = ev.max_rounds ?? state.maxRounds;
      }
      setActivePhase(ev.phase);
      if (ev.phase.startsWith('round_')) {
        appendPhaseDivider(`Round ${ev.round} of ${state.maxRounds}`);
      } else if (ev.phase === 'summary') {
        appendPhaseDivider('Final Summary');
        setActivePhase('summary');
      }
      break;

    case 'speaker_start':
      state.isBusy = true;
      state.activeSpeaker = ev.speaker;
      state.activeText = '';
      state.activeBubble = createBubble(ev.speaker, ev.round);
      updateControls();
      break;

    case 'text_chunk':
      if (state.activeBubble && state.activeSpeaker === ev.speaker) {
        state.activeText += ev.text;
        const body = state.activeBubble.querySelector('.bubble-body');
        body.textContent = state.activeText;  // raw while streaming
        body.classList.add('streaming-cursor');
        scrollToBottom();
      }
      break;

    case 'speaker_done':
      if (state.activeBubble) {
        const body = state.activeBubble.querySelector('.bubble-body');
        body.classList.remove('streaming-cursor');
        body.innerHTML = marked.parse(state.activeText);  // render markdown
        const indicator = state.activeBubble.querySelector('.typing-indicator');
        if (indicator) indicator.remove();
      }
      state.activeBubble = null;
      state.activeSpeaker = null;
      state.activeText = '';
      if (ev.speaker === 'facilitator' || ev.speaker === 'summary') {
        state.isBusy = false;
        updateControls();
      }
      break;

    case 'user_input':
      appendUserBubble(ev.text);
      break;

    case 'debate_ended':
      state.phase = 'done';
      state.isBusy = false;
      if (state.eventSource) { state.eventSource.close(); state.eventSource = null; }
      setActivePhase('summary');
      updateControls();
      toast('Debate concluded — summary ready!', 'success');
      break;
  }
}

// ── Bubble helpers ─────────────────────────────────────────────────────────
const SPEAKER_META = {
  facilitator: { label: 'Facilitator', badge: 'badge-facilitator' },
  grok:        { label: 'Grok',        badge: 'badge-grok' },
  claude:      { label: 'Claude',      badge: 'badge-claude' },
  gpt:         { label: 'GPT',         badge: 'badge-gpt' },
  gemini:      { label: 'Gemini',      badge: 'badge-gemini' },
  summary:     { label: 'Summary',     badge: 'badge-summary' },
  moderator:   { label: 'You',         badge: 'badge-moderator' },
};

function createBubble(speaker, round) {
  const meta = SPEAKER_META[speaker] || { label: speaker, badge: '' };
  const transcript = document.getElementById('transcript');

  const bubble = document.createElement('div');
  bubble.className = `bubble bubble-${speaker}`;

  const header = document.createElement('div');
  header.className = 'bubble-header';

  const badge = document.createElement('span');
  badge.className = `speaker-badge ${meta.badge}`;
  badge.textContent = meta.label;
  header.appendChild(badge);

  if (round) {
    const tag = document.createElement('span');
    tag.className = 'round-tag';
    tag.textContent = `Round ${round}`;
    header.appendChild(tag);
  }

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  header.appendChild(typing);

  const body = document.createElement('div');
  body.className = 'bubble-body';

  bubble.appendChild(header);
  bubble.appendChild(body);
  transcript.appendChild(bubble);
  scrollToBottom();
  return bubble;
}

function appendUserBubble(text) {
  const transcript = document.getElementById('transcript');
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-user-input';

  const header = document.createElement('div');
  header.className = 'bubble-header';
  header.style.justifyContent = 'flex-end';
  const badge = document.createElement('span');
  badge.className = 'speaker-badge badge-moderator';
  badge.textContent = 'You';
  header.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'bubble-body';
  body.innerHTML = marked.parse(escapeHtml(text));

  bubble.appendChild(header);
  bubble.appendChild(body);
  transcript.appendChild(bubble);
  scrollToBottom();
}

function appendPhaseDivider(label) {
  const div = document.createElement('div');
  div.className = 'phase-divider';
  div.textContent = label;
  document.getElementById('transcript').appendChild(div);
}

function scrollToBottom() {
  const t = document.getElementById('transcript');
  t.scrollTop = t.scrollHeight;
}

// ── Control buttons ────────────────────────────────────────────────────────
function updateControls() {
  const phase = state.phase;
  const busy = state.isBusy;
  const roundBtn = document.getElementById('btn-start-round');
  const sumBtn = document.getElementById('btn-summarize');

  const canStartRound = !busy && phase === 'ready' && state.currentRound < state.maxRounds;
  const canSummarize = !busy && (phase === 'ready' || phase === 'done') && state.currentRound > 0 && phase !== 'done' && phase !== 'summary';

  roundBtn.disabled = !canStartRound;
  roundBtn.textContent = `▶ Start Round ${state.currentRound + 1}`;
  sumBtn.disabled = !canSummarize;
}

// ── Actions ────────────────────────────────────────────────────────────────
async function startRound() {
  if (state.isBusy) return;
  state.isBusy = true;
  updateControls();
  await apiPost('/round');
}

async function startSummary() {
  if (state.isBusy) return;
  state.isBusy = true;
  updateControls();
  await apiPost('/summarize');
}

async function sendInterrupt() {
  const input = document.getElementById('interrupt-input');
  const message = input.value.trim();
  if (!message || !state.sessionId) return;

  input.value = '';
  autoResize(input);

  const res = await fetch(`/api/session/${state.sessionId}/interrupt`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  });
  if (!res.ok) {
    const d = await res.json();
    toast(d.error || 'Failed to send', 'error');
  } else {
    toast('Got it! Debaters will address your point next round.', 'success');
  }
}

function interruptKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendInterrupt();
  }
}

async function apiPost(path) {
  if (!state.sessionId) return;
  try {
    const res = await fetch(`/api/session/${state.sessionId}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    if (!res.ok) {
      const d = await res.json();
      toast(d.error || 'Request failed', 'error');
      state.isBusy = false;
      updateControls();
    }
  } catch {
    toast('Server unreachable', 'error');
    state.isBusy = false;
    updateControls();
  }
}

async function syncStatus() {
  if (!state.sessionId) return;
  try {
    const res = await fetch(`/api/session/${state.sessionId}/status`);
    if (!res.ok) return;
    const data = await res.json();
    if (data.phase === 'ready') {
      state.phase = 'ready';
      state.isBusy = false;
      state.currentRound = data.current_round;
      state.maxRounds = data.max_rounds;
      updateControls();
    }
  } catch (_) {}
}

// ── Utility ────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ` ${type}` : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Context generation ────────────────────────────────────────────────────────
let _contextSource = null;

async function generateContext() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) { toast('Enter a debate topic first', 'error'); return; }

  const btn = document.getElementById('btn-gen-context');
  const statusEl = document.getElementById('context-gen-status');
  const statusMsg = document.getElementById('context-gen-msg');
  const textarea = document.getElementById('context-input');

  btn.disabled = true;
  btn.textContent = '⏳ Generating…';
  textarea.value = '';
  statusEl.style.display = 'flex';
  statusMsg.textContent = 'Claude is researching the topic…';

  if (_contextSource) { _contextSource.close(); _contextSource = null; }

  let generated = '';

  try {
    // Use fetch + ReadableStream to stream the SSE response
    const res = await fetch('/api/context/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic }),
    });

    if (!res.ok) {
      const d = await res.json();
      toast(d.error || 'Failed to generate context', 'error');
      resetGenBtn(btn, statusEl);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // Parse SSE lines
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (ev.type === 'chunk') {
            generated += ev.text;
            textarea.value = generated;
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 320) + 'px';
          } else if (ev.type === 'done') {
            statusMsg.textContent = '✅ Context generated — review and edit as needed.';
            btn.disabled = false;
            btn.textContent = '✨ Regenerate';
            return;
          } else if (ev.type === 'error') {
            toast('Generation error: ' + ev.text, 'error');
            resetGenBtn(btn, statusEl);
            return;
          }
        } catch (_) {}
      }
    }
  } catch (e) {
    toast('Cannot reach the server', 'error');
    resetGenBtn(btn, statusEl);
  }
}

function resetGenBtn(btn, statusEl) {
  btn.disabled = false;
  btn.textContent = '✨ Generate with AI';
  statusEl.style.display = 'none';
}
</script>
</body>
</html>
